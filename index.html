<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: white;
            text-align: center;
        }
        #chat {
            width: 60%;
            margin: auto;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 10px;
        }
        input {
            width: 60%;
            padding: 10px;
        }
        button {
            padding: 10px;
        }
        .user { color: cyan; }
        .ai { color: lightgreen; }
    </style>
</head>
<body>

<h2>AI Assistant</h2>

<div id="chat"></div>

<input type="text" id="input" placeholder="Type your question..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    let message = input.value;
    if (!message) return;

    chat.innerHTML += `<p class="user"><b>You:</b> ${message}</p>`;
    input.value = "";

    let response = await fetch("http://127.0.0.1:5000/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ question: message })
    });

    let data = await response.json();

    chat.innerHTML += `<p class="ai"><b>AI:</b> ${data.answer}</p>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
