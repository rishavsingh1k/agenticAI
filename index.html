<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        #chat {
            width: 60%;
            margin: auto;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 10px;
            text-align: left;
        }

        input {
            width: 50%;
            padding: 10px;
            margin-right: 5px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .user {
            color: cyan;
        }

        .ai {
            color: lightgreen;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<h2>AI Assistant</h2>

<div id="chat"></div>

<input type="text" id="input" placeholder="Type your question..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chat");

    let message = input.value.trim();
    if (!message) return;

    // Show user message
    chat.innerHTML += `<p class="user"><b>You:</b> ${message}</p>`;
    input.value = "";

    // Show loading
    chat.innerHTML += `<p class="ai" id="loading"><b>AI:</b> Thinking...</p>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        let response = await fetch("https://agenticai-2h0e.onrender.com/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: message })
        });

        let data = await response.json();

        // Remove loading
        document.getElementById("loading").remove();

        // Show AI response
        chat.innerHTML += `<p class="ai"><b>AI:</b> ${data.answer}</p>`;

    } catch (error) {
        document.getElementById("loading").remove();
        chat.innerHTML += `<p class="error"><b>Error:</b> ${error}</p>`;
    }

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
